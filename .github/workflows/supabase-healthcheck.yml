name: Supabase healthcheck

on:
  schedule:
    - cron: "17 8 */3 * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping healthcheck endpoint
        run: |
          curl --fail --silent --show-error \
            --header "x-healthcheck-secret: ${{ secrets.HEALTHCHECK_SECRET }}" \
            "${{ secrets.HEALTHCHECK_URL }}"
